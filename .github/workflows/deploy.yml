name: Deploy to EC2 (Docker Compose)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Git Pull on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            # Fix ownership of entire working directory (may be owned by root from initial setup)
            sudo chown -R ubuntu:ubuntu /home/ubuntu/pharmassist
            cd /home/ubuntu/pharmassist
            git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "https://github.com/"
            git pull origin main

      - name: Build and Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/ubuntu/pharmassist
            sudo env DOCKER_BUILDKIT=1 docker compose up --build -d --remove-orphans